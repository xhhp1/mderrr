<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قسمة الدرجات على 2</title>
  <style>
    body{
      margin:0;
      font-family:Tahoma, Arial, sans-serif;
      background:#111;
      color:#f5f5f5;
      padding:20px;
    }
    .wrap{
      max-width:1100px;
      margin:auto;
    }
    .box{
      background:#1b1b1b;
      border:1px solid #333;
      border-radius:14px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 0 20px rgba(0,0,0,.25);
    }
    h1{
      margin-top:0;
      color:#e0ca51;
      font-size:28px;
    }
    p{
      color:#ccc;
      line-height:1.8;
    }
    textarea{
      width:100%;
      min-height:280px;
      resize:vertical;
      border:none;
      outline:none;
      border-radius:10px;
      padding:15px;
      font-size:15px;
      background:#0f0f0f;
      color:#fff;
      box-sizing:border-box;
      line-height:1.8;
    }
    .buttons{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:15px;
    }
    button{
      background:#e0ca51;
      color:#111;
      border:none;
      border-radius:10px;
      padding:12px 18px;
      font-size:15px;
      cursor:pointer;
      font-weight:bold;
    }
    button.secondary{
      background:#333;
      color:#fff;
    }
    .output{
      white-space:pre-wrap;
      background:#0f0f0f;
      border-radius:10px;
      padding:15px;
      min-height:220px;
      line-height:1.9;
      overflow:auto;
      direction:rtl;
    }
    .note{
      color:#9ad;
      font-size:14px;
      margin-top:10px;
    }
    .stats{
      margin-top:12px;
      color:#ddd;
      font-size:14px;
    }
    .bad{
      color:#ff9b9b;
    }
    .good{
      color:#9cffaa;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h1>موقع قسمة الدرجات على 2</h1>
      <p>
        الصق البيانات كما هي، والموقع سيقوم بقراءة كل سطر واستخراج الدرجة مثل:
        <b>21 / 23</b>
        ثم يحوّلها إلى:
        <b>10.5 / 23</b>
      </p>

      <textarea id="input" placeholder="الصق النتائج هنا..."></textarea>

      <div class="buttons">
        <button onclick="processData()">قسّم الدرجات</button>
        <button class="secondary" onclick="copyResult()">نسخ النتائج</button>
        <button class="secondary" onclick="clearAll()">مسح الكل</button>
      </div>

      <div class="stats" id="stats"></div>
    </div>

    <div class="box">
      <h1>النتيجة</h1>
      <div class="output" id="output">ستظهر النتائج هنا...</div>
      <div class="note">
        ملاحظة: أي سطر لا يبدأ بدرجة صحيحة مثل "18 / 20" سيتم تجاهله تلقائيًا.
      </div>
    </div>
  </div>

  <script>
    function processData() {
      const input = document.getElementById("input").value.trim();
      const output = document.getElementById("output");
      const stats = document.getElementById("stats");

      if (!input) {
        output.textContent = "الرجاء لصق البيانات أولاً.";
        stats.innerHTML = "";
        return;
      }

      const lines = input.split(/\r?\n/);
      const results = [];
      let validCount = 0;
      let skippedCount = 0;

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) continue;

        // استخراج الدرجة من بداية السطر فقط مثل: 21 / 23
        const scoreMatch = line.match(/^(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)/);
        if (!scoreMatch) {
          skippedCount++;
          continue;
        }

        const originalScore = parseFloat(scoreMatch[1]);
        const totalScore = scoreMatch[2];
        const halfScore = originalScore / 2;

        // تقسيم السطر غالبًا بالتبويبات
        let parts = line.split("\t").map(x => x.trim()).filter(Boolean);

        // لو ما ضبط بالتبويب نحاول بمسافات كثيرة
        if (parts.length < 2) {
          parts = line.split(/\s{2,}/).map(x => x.trim()).filter(Boolean);
        }

        // حذف أول خانة لأنها الدرجة الأصلية
        if (parts.length > 0) {
          const firstPartScoreMatch = parts[0].match(/^(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)/);
          if (firstPartScoreMatch) parts.shift();
        }

        const name = parts[0] || "غير معروف";
        const code = parts[1] || "-";
        const id = parts[2] || "-";

        results.push(
          `الاسم: ${name}\n` +
          `الكود: ${code}\n` +
          `الآيدي: ${id}\n` +
          `الدرجة الأصلية: ${originalScore} / ${totalScore}\n` +
          `بعد القسمة على 2: ${halfScore} / ${totalScore}\n` +
          `────────────────────`
        );

        validCount++;
      }

      output.textContent = results.length ? results.join("\n") : "لم يتم العثور على أي درجات صحيحة.";
      stats.innerHTML = `
        <span class="good">تمت معالجة ${validCount} سطر صحيح</span>
        ${skippedCount ? `| <span class="bad">تم تجاهل ${skippedCount} سطر غير صالح</span>` : ""}
      `;
    }

    function copyResult() {
      const text = document.getElementById("output").textContent;
      if (!text || text === "ستظهر النتائج هنا...") return;

      navigator.clipboard.writeText(text)
        .then(() => alert("تم نسخ النتائج بنجاح"))
        .catch(() => alert("تعذر نسخ النتائج"));
    }

    function clearAll() {
      document.getElementById("input").value = "";
      document.getElementById("output").textContent = "ستظهر النتائج هنا...";
      document.getElementById("stats").innerHTML = "";
    }
  </script>
</body>
</html>
